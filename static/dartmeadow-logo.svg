<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" version="1.1" width="2352" height="1920" viewBox="0 0 2352 1920">
<!--
  DART Meadow logo  -  vectorized from the original raster artwork via
  potrace (bitmap-to-vector tracing), separated into 5 logical groups
  (tagline / DART / Meadow / underline / skyboard) using connected-
  component analysis on the source image, each traced and recolored
  independently. Recolored to the established sunset theme (see the
  :root CSS comment in index.html): DART reads in the theme's cool
  electric blue, flowing into Meadow's hot aurora magenta/violet  -  the
  wordmark's own left-to-right structure tells the same story the rest
  of the theme already tells. The underline carries the one warm coral
  'fiery accent', used sparingly as a thin line rather than as ambient
  color. Gradients use userSpaceOnUse with explicit coordinates.
  Real bug found and fixed while building this: ImageMagick's default
  PNG-to-PBM conversion treats white as background/black as foreground
  (a scanned-page convention), the opposite of this mask's own white=
  letters/black=background convention  -  potrace was tracing the
  INVERTED shape (the whole canvas as one region with the actual
  letters as tiny holes in it) until traced with potrace's own  - invert
  flag to correct the polarity at the source.
-->
<defs>
  <linearGradient id="gradTagline" gradientUnits="userSpaceOnUse" x1="3180" y1="12505.0" x2="11320" y2="12505.0"><stop offset="0" stop-color="#8FA8FF"/><stop offset="1" stop-color="#C9A8F0"/></linearGradient>
  <linearGradient id="gradDart" gradientUnits="userSpaceOnUse" x1="3410" y1="11245.0" x2="9930" y2="11245.0"><stop offset="0" stop-color="#1A1030"/><stop offset="0.55" stop-color="#3A3AA0"/><stop offset="1" stop-color="#5B7FFF"/></linearGradient>
  <linearGradient id="gradMeadow" gradientUnits="userSpaceOnUse" x1="10470" y1="11295.0" x2="21280" y2="11295.0"><stop offset="0" stop-color="#5B7FFF"/><stop offset="0.35" stop-color="#9D5CE0"/><stop offset="0.7" stop-color="#E356C8"/><stop offset="1" stop-color="#FF4FA3"/></linearGradient>
  <linearGradient id="gradUnderline" gradientUnits="userSpaceOnUse" x1="1800" y1="9865.0" x2="14130" y2="9865.0"><stop offset="0" stop-color="#FFD9A8"/><stop offset="0.6" stop-color="#FF9A5A"/><stop offset="1" stop-color="#FF6B3D"/></linearGradient>
  <linearGradient id="gradSkyboard" gradientUnits="userSpaceOnUse" x1="4810" y1="8720.0" x2="20680" y2="8720.0"><stop offset="0" stop-color="#5B7FFF"/><stop offset="0.45" stop-color="#7B5CE8"/><stop offset="1" stop-color="#B04FD0"/></linearGradient>
  <filter id="logoGlow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;height:100%;
  background:#000308;
  overflow:hidden;
  font-family:'Orbitron','Share Tech Mono',monospace;
}
#splash{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 50% 40%,#040e1c 0%,#000308 70%);
  z-index:100;
  transition:opacity 0.6s ease;
}
#splash.fade{opacity:0;pointer-events:none}
.dm-logo{
  font-size:clamp(32px,8vw,64px);font-weight:900;
  letter-spacing:0.18em;
  color:#b8dff5;
  text-shadow:0 0 30px rgba(0,200,255,0.5),0 0 60px rgba(0,150,220,0.2);
  margin-bottom:6px;
}
.dm-sub{
  font-size:clamp(9px,2.2vw,14px);letter-spacing:0.35em;
  color:#005577;margin-bottom:40px;
}
.launch-ring{
  width:clamp(60px,14vw,100px);height:clamp(60px,14vw,100px);
  border-radius:50%;
  border:2px solid rgba(0,200,255,0.15);
  border-top-color:#00ccff;
  animation:spin 1.1s linear infinite;
  position:relative;
}
.launch-ring::after{
  content:'';position:absolute;
  inset:8px;border-radius:50%;
  border:1.5px solid rgba(160,100,255,0.2);
  border-bottom-color:#9955ff;
  animation:spin 1.8s linear infinite reverse;
}
@keyframes spin{to{transform:rotate(360deg)}}
.launch-label{
  margin-top:18px;font-size:clamp(8px,2vw,11px);
  letter-spacing:0.3em;color:#003355;
  animation:pulse 1.4s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:0.4}50%{opacity:0.9}}
#app-frame{
  position:fixed;inset:0;width:100%;height:100%;
  border:none;display:block;
}
</style>
</head>

<div id="splash">
  <div class="dm-logo">DART</div>
  <div class="dm-sub">MEADOW · ZERO-G SKYBOARD</div>
  <div class="launch-ring"></div>
  <div class="launch-label">INITIALIZING FLIGHT SYSTEMS</div>
</div>

<iframe id="app-frame"
  src="https://dartmeadow.com/dartmeadow.html"
  allow="fullscreen; accelerometer; gyroscope; autoplay; web-share"
  allowfullscreen
  loading="eager">
</iframe>

<script>
// Request fullscreen on load — covers the PWA shell itself
// The iframe content runs in its own context and also requests fullscreen internally
(function(){
  function goFullscreen(){
    const el = document.documentElement;
    if(el.requestFullscreen) el.requestFullscreen();
    else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    else if(el.mozRequestFullScreen) el.mozRequestFullScreen();
  }

  // Fade splash once iframe reports it has loaded
  const frame = document.getElementById('app-frame');
  const splash = document.getElementById('splash');

  frame.addEventListener('load', function(){
    setTimeout(function(){
      splash.classList.add('fade');
      setTimeout(function(){ splash.style.display='none'; }, 650);
    }, 600);
  });

  // On any user gesture — go fullscreen (required by browsers)
  document.addEventListener('click',  goFullscreen, {once:true});
  document.addEventListener('touchstart', goFullscreen, {once:true, passive:true});

  // Service worker registration for offline capability + install prompt
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('/sw.js').catch(function(){});
  }

  // Capture install prompt for manual trigger if needed
  window.addEventListener('beforeinstallprompt', function(e){
    e.preventDefault();
    window._dmInstallPrompt = e;
  });
})();
</script>
</body>
</html>
